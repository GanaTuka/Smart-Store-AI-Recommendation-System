<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products | Smart Store AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="nav"><strong>Smart Store AI</strong><a href="/">Home</a><a href="/recommendations">AI Picks</a><a href="/admin">Admin</a></nav>
    <main class="page catalog-page">
        <section class="catalog-hero">
            <p class="eyebrow">Product Catalog</p>
            <h1>Browse popular products from real commerce data.</h1>
            <p>Products are grouped by Olist category, ranked by sales volume, and displayed like a modern storefront.</p>
        </section>
        <section class="catalog-toolbar">
            <input id="productSearch" type="search" placeholder="Search categories like furniture, beauty, electronics...">
            <span id="productCount">Loading products...</span>
        </section>
        <section id="products" class="store-product-grid"></section>
    </main>
    <script src="{{ url_for('static', filename='js/products.js') }}"></script>
</body>
</html>
